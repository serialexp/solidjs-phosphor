name: Update and Publish

on:
  schedule:
    # Weekly on Monday at 06:00 UTC
    - cron: '0 6 * * 1'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write
  id-token: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      - name: Clone phosphor-icons/core
        run: git clone --depth 1 https://github.com/phosphor-icons/core.git phosphor-core

      - name: Generate components
        run: pnpm run generate

      - name: Type-check
        run: pnpm run check

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet src/; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump version and publish
        if: steps.diff.outputs.changed == 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          # Match upstream major.minor, auto-increment patch
          UPSTREAM_VERSION=$(jq -r .version phosphor-core/package.json)
          UPSTREAM_MAJOR_MINOR=$(echo "$UPSTREAM_VERSION" | cut -d. -f1,2)
          CURRENT_VERSION=$(jq -r .version package.json)
          CURRENT_MAJOR_MINOR=$(echo "$CURRENT_VERSION" | cut -d. -f1,2)
          CURRENT_PATCH=$(echo "$CURRENT_VERSION" | cut -d. -f3)

          if [ "$UPSTREAM_MAJOR_MINOR" != "$CURRENT_MAJOR_MINOR" ]; then
            # Upstream major.minor changed — reset patch to 0
            npm version "${UPSTREAM_MAJOR_MINOR}.0" --no-git-tag-version
          else
            # Same major.minor — bump patch
            npm version "${CURRENT_MAJOR_MINOR}.$((CURRENT_PATCH + 1))" --no-git-tag-version
          fi

          NEW_VERSION=$(jq -r .version package.json)
          echo "Publishing v${NEW_VERSION}"

          pnpm publish --access public --no-git-checks --provenance

          # Commit and tag
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/ package.json
          git commit -m "chore: update icons to v${NEW_VERSION}"
          git tag "v${NEW_VERSION}"
          git push
          git push --tags
